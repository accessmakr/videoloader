


[build]
  command = "node generate-sitemap.js"
  publish = "."
  environment = { NODE_VERSION = "20" }   # pinned for maximum stability on Netlify

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:;"
