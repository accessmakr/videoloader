


<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | VideoLoader</title>
    <meta name="description" content="Get in touch with the VideoLoader team. Questions, suggestions, or bug reports are always welcome.">
    <link rel="canonical" href="https://intelreap.com/contact-us" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap'); body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300 text-slate-900 dark:text-slate-100">
    <main class="max-w-2xl mx-auto px-6 py-16">
        <h1 class="text-5xl font-extrabold tracking-tight mb-8 text-center">Contact Us</h1>
        
        <div class="bg-white dark:bg-slate-800 rounded-3xl p-10">
            <form id="contact-form" class="space-y-6">
                <input type="text" placeholder="Your name" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-700">
                <input type="email" placeholder="Email address" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-700">
                <textarea placeholder="Your message..." rows="6" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-700"></textarea>
                <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold">Send Message</button>
            </form>
        </div>
        
        <p class="text-center mt-8 text-slate-500">Or email us directly: support@intelreap.com</p>
    </main>

    <script>
        // Tiny form handler (demo only)
        document.getElementById('contact-form').addEventListener('submit', e => {
            e.preventDefault();
            alert("✅ Thank you! Message received (demo).");
        });
    </script>

    <!-- GLOBAL SHARED SCRIPTS -->
    <script src="/js/registry.js"></script>
    <script src="/js/root-config.js"></script>
    <script src="/js/menu-system.js"></script>
    <script src="/js/search-system.js"></script>
    <script src="/js/schema.js"></script>
    <script src="/js/internal-links.js"></script>
    <script src="/js/legal-engine.js"></script>
</body>
</html>
